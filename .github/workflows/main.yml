name: Build and Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main   # 如果你的默认分支是 master，改成 master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
