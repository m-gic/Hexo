name: Install Hexo Theme

# 手动触发，触发时填入主题的 npm 包名
# 例如: hexo-theme-butterfly / hexo-theme-shoka / hexo-theme-next
on:
  workflow_dispatch:
    inputs:
      theme_package:
        description: "主题的 npm 包名 (例如 hexo-theme-butterfly)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  install-theme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install existing dependencies
        run: npm install

      - name: Install theme package
        run: npm install ${{ inputs.theme_package }} --save

      - name: Install pug & stylus renderers (大多数主题需要)
        run: npm install hexo-renderer-pug hexo-renderer-stylus --save

      - name: Apply theme in _config.yml
        run: |
          # 从包名里去掉 "hexo-theme-" 前缀，得到写进配置文件的主题名
          THEME_NAME="${{ inputs.theme_package }}"
          THEME_NAME="${THEME_NAME#hexo-theme-}"
          echo "应用主题: $THEME_NAME"

          if grep -q "^theme:" _config.yml; then
            sed -i "s/^theme:.*/theme: $THEME_NAME/" _config.yml
          else
            echo "theme: $THEME_NAME" >> _config.yml
          fi

          # 生成主题独立配置文件 _config.<主题名>.yml（如果还不存在的话）
          # 内容拷贝自 node_modules 里主题自带的默认配置
          THEME_CONFIG_FILE="_config.${THEME_NAME}.yml"
          THEME_DEFAULT_CONFIG="node_modules/${{ inputs.theme_package }}/_config.yml"
          if [ ! -f "$THEME_CONFIG_FILE" ] && [ -f "$THEME_DEFAULT_CONFIG" ]; then
            cp "$THEME_DEFAULT_CONFIG" "$THEME_CONFIG_FILE"
            echo "已生成 $THEME_CONFIG_FILE，后续主题相关设置（导航栏、头像、颜色等）请编辑这个文件"
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: install and apply theme ${{ inputs.theme_package }}"
          git push
